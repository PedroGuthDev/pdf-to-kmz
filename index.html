<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF to KMZ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { margin-bottom: 8px; }
    h2 { margin-top: 32px; margin-bottom: 8px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    #pdfInput { margin-bottom: 12px; }
    #status {
      display: none;
      margin: 12px 0;
      padding: 10px 14px;
      border-radius: 4px;
      font-weight: bold;
    }
    #status.error {
      color: #b00020;
      background: #fff0f0;
      border: 1px solid #f5c2c2;
    }
    #status.success {
      color: #1a6e2e;
      background: #f0fff4;
      border: 1px solid #b7e4c7;
    }
    #status.info {
      color: #555;
      background: #f5f5f5;
      border: 1px solid #ddd;
    }
    #summary {
      display: none;
      margin: 12px 0;
      padding: 12px 16px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    #summary ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }
    #summary li { margin: 4px 0; }
    #warnings {
      display: none;
      margin: 12px 0;
      padding: 12px 16px;
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 4px;
    }
    #warnings h3 { margin: 0 0 8px; font-size: 0.95em; color: #7d5800; }
    #warnings ul { margin: 0; padding-left: 20px; }
    #warnings li { margin: 4px 0; font-size: 0.9em; color: #7d5800; }
    #coordForm {
      display: none;
      margin-top: 32px;
      padding: 16px 20px;
      background: #f0f7ff;
      border: 1px solid #b3d4f5;
      border-radius: 4px;
    }
    #coordForm h2 { margin-top: 0; }
    #coordForm p { color: #555; font-style: italic; }
  </style>
</head>
<body>

  <h1>PDF to KMZ</h1>
  <p>Upload an INFOVIAS PDF to extract post, distance, and cable segment data.</p>

  <section id="uploadSection">
    <label for="pdfInput">Select PDF file:</label>
    <input type="file" id="pdfInput" accept=".pdf">
  </section>

  <div id="status"></div>

  <div id="summary">
    <strong>Parse results:</strong>
    <ul id="summaryList"></ul>
  </div>

  <div id="warnings">
    <h3>Parser warnings</h3>
    <ul id="warningsList"></ul>
  </div>

  <section id="coordForm">
    <h2>Step 2: Enter First Post Coordinates</h2>
    <p>Coming in Phase 2</p>
  </section>

  <script type="module">
    import { parsePdf } from './parser/pdf-parser.js';

    const pdfInput   = document.getElementById('pdfInput');
    const statusEl   = document.getElementById('status');
    const summaryEl  = document.getElementById('summary');
    const summaryList = document.getElementById('summaryList');
    const warningsEl = document.getElementById('warnings');
    const warningsList = document.getElementById('warningsList');
    const coordForm  = document.getElementById('coordForm');

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = type; // 'error' | 'success' | 'info'
      statusEl.style.display = 'block';
    }

    function hideStatus() {
      statusEl.style.display = 'none';
      statusEl.className = '';
    }

    function clearResults() {
      hideStatus();
      summaryEl.style.display = 'none';
      summaryList.innerHTML = '';
      warningsEl.style.display = 'none';
      warningsList.innerHTML = '';
      coordForm.style.display = 'none';
    }

    function showWarnings(warnings) {
      if (!warnings || warnings.length === 0) return;
      warningsList.innerHTML = '';
      for (const w of warnings) {
        const li = document.createElement('li');
        li.textContent = w;
        warningsList.appendChild(li);
      }
      warningsEl.style.display = 'block';
    }

    pdfInput.addEventListener('change', async (e) => {
      clearResults();

      const file = e.target.files[0];
      if (!file) return;

      // T-03-01: Size guard — reject before calling arrayBuffer()
      if (file.size > 50 * 1024 * 1024) {
        showStatus('File exceeds 50 MB limit. Please select a smaller PDF.', 'error');
        return;
      }

      showStatus('Parsing...', 'info');

      let buf;
      try {
        buf = await file.arrayBuffer();
      } catch (err) {
        showStatus('Could not read file: ' + err.message, 'error');
        return;
      }

      let result;
      try {
        // T-03-02: Outer try/catch — prevent any parsePdf() exception from reaching DOM unhandled
        result = await parsePdf(buf);
      } catch (err) {
        showStatus('Unexpected error: ' + err.message, 'error');
        return;
      }

      // ── Handle error cases ──────────────────────────────────────────────────

      if (result.error === 'missing_layers') {
        const missingStr = result.missing.join(', ');
        const availableStr = result.allNames.join(', ');
        showStatus(
          'Missing PDF layers: ' + missingStr + '. Available layers: ' + availableStr,
          'error'
        );
        return;
      }

      if (result.error === 'parse_failed') {
        showStatus('Parse failed: ' + result.message, 'error');
        // Show any partial warnings even on parse failure
        showWarnings(result.warnings);
        return;
      }

      // ── Success path ────────────────────────────────────────────────────────

      showStatus('Parse complete.', 'success');

      // Populate summary (D-14)
      summaryList.innerHTML = '';
      const summaryData = [
        'Posts found: ' + result.posts.length,
        'Distances found: ' + result.distances.length,
        'Cable segments found: ' + result.cableSegments.length,
      ];
      for (const text of summaryData) {
        const li = document.createElement('li');
        li.textContent = text;
        summaryList.appendChild(li);
      }
      summaryEl.style.display = 'block';

      // D-15: Continuous flow — show coordinate form immediately, no confirmation gate
      coordForm.style.display = 'block';

      // D-07: Show all parser warnings
      showWarnings(result.warnings);
    });
  </script>

</body>
</html>
